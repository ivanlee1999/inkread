name: Android unit tests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      gradle-task:
        description: Gradle task to run
        required: false
        default: testGithubDebugUnitTest
        type: string

permissions:
  contents: read

concurrency:
  group: android-unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Run unit tests
        run: ./gradlew --stacktrace --no-daemon ${{ github.event.inputs.gradle-task || 'testGithubDebugUnitTest' }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: warn
