name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Build debug APK
        run: ./gradlew assembleGithubDebug
      
      - name: Get version info
        id: version
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          APK=$(find . -path "*/github/debug/*.apk" -type f)
          echo "apk=$APK" >> $GITHUB_OUTPUT
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: inkread-debug
          path: app/build/outputs/apk/github/debug/*.apk
          retention-days: 30

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: inkread-debug
          path: ./apk
      
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          TAG="v$(date +%Y%m%d-%H%M)-${COMMIT}"
          APK=$(find ./apk -name "*.apk" -type f | head -1)
          gh release create "$TAG" \
            --title "InkRead $TAG" \
            --notes "Auto-built from commit $COMMIT" \
            "$APK"
          echo "RELEASE_URL=https://github.com/ivanlee1999/inkread/releases/tag/$TAG" >> $GITHUB_ENV
          echo "Release: https://github.com/ivanlee1999/inkread/releases/tag/$TAG"
